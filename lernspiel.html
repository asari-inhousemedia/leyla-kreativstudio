<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leyla's Kreativstudio ✨</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
/* ── CSS Custom Properties ─────────────────────────────────── */
:root {
  --sb-w: 86px;   /* sidebar width */
  --hh:   72px;   /* header height */
  --bh:   0px;    /* bottom bar height */
}
/* Tablet */
@media (min-width: 640px) and (max-width: 899px) {
  :root { --sb-w: 70px; --hh: 66px; }
}
/* Phone */
@media (max-width: 639px) {
  :root { --sb-w: 0px; --hh: 54px; --bh: 52px; }
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: -webkit-fill-available; }

body {
  font-family: 'Chalkboard SE', 'Comic Sans MS', cursive;
  height: 100vh; height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-user-select: none; user-select: none;
  background: linear-gradient(135deg, #ffd1dc, #c8e6ff, #d4f5c4, #fff3b0);
  background-size: 400% 400%;
  animation: bgShift 8s ease infinite;
}
@keyframes bgShift {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

/* ── SIDEBAR (desktop / tablet) ────────────────────────────── */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--sb-w);
  background: rgba(255,255,255,0.52);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-right: 3px solid rgba(255,255,255,0.85);
  z-index: 200;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 12px;
}
@media (max-width: 639px) { #sidebar { display: none; } }

#sidebarLabel {
  font-size: 10px; font-weight: bold; color: #9c7cd4;
  letter-spacing: 0.5px; margin-bottom: 4px;
}
#starList {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: space-around;
  width: 100%; position: relative; padding: 2px 0;
}
#starList::before {
  content: ''; position: absolute; top: 0; bottom: 0; left: 50%;
  transform: translateX(-50%); width: 3px;
  background: linear-gradient(to bottom, rgba(180,180,180,0.15), rgba(180,180,180,0.06));
  border-radius: 2px; z-index: 0;
}
.star-slot {
  position: relative; z-index: 1;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; opacity: 0.18;
  transition: opacity 0.5s, filter 0.5s;
}
.star-slot::after { content: '⭐'; }
.star-slot.lit {
  opacity: 1;
  filter: drop-shadow(0 0 5px rgba(255,215,0,0.9));
  animation: starPop 0.6s ease both;
}
.star-slot.lit-glow {
  filter: drop-shadow(0 0 8px rgba(255,215,0,1)) drop-shadow(0 0 18px rgba(255,180,0,0.5));
}
@keyframes starPop {
  0%   { transform: scale(0) rotate(-200deg); opacity: 0; }
  65%  { transform: scale(1.55) rotate(15deg); opacity: 1; }
  82%  { transform: scale(0.88) rotate(-4deg); }
  100% { transform: scale(1) rotate(0); }
}
#sidebarMoon {
  font-size: 38px; margin-top: 6px; line-height: 1;
  filter: grayscale(0.65) brightness(0.82);
  transition: filter 1.2s, transform 1.2s;
  animation: moonBob 4s ease-in-out infinite;
}
#sidebarMoon.reached {
  animation: moonCelebrate 0.75s ease infinite alternate;
}
@keyframes moonBob {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50%      { transform: translateY(-6px) rotate(4deg); }
}
@keyframes moonCelebrate {
  from { transform: scale(1) rotate(-14deg); filter: drop-shadow(0 0 22px rgba(255,225,80,1)); }
  to   { transform: scale(1.22) rotate(14deg); filter: drop-shadow(0 0 40px rgba(255,200,0,1)); }
}

/* ── BOTTOM BAR (phone only) ───────────────────────────────── */
#bottomBar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--bh);
  align-items: center; gap: 6px; padding: 0 12px;
  background: rgba(255,255,255,0.55);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  border-top: 2px solid rgba(255,255,255,0.88);
  z-index: 200;
}
@media (max-width: 639px) { #bottomBar { display: flex; } }

#bbLabel {
  font-size: 11px; font-weight: bold; color: #9c7cd4;
  white-space: nowrap; min-width: 38px;
}
#bbTrack {
  flex: 1; display: flex; align-items: center; gap: 2px;
}
.bb-dot {
  flex: 1; height: 10px; max-width: 14px; border-radius: 5px;
  background: rgba(180,180,180,0.28); border: 1.5px solid rgba(180,180,180,0.4);
  transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
}
.bb-dot.lit {
  background: #ffd700; border-color: #ffaa00;
  box-shadow: 0 0 5px rgba(255,215,0,0.85);
}
#bbMoon {
  font-size: 26px; line-height: 1;
  filter: grayscale(0.65) brightness(0.82);
  transition: filter 0.8s, transform 0.8s;
}
#bbMoon.reached {
  filter: drop-shadow(0 0 10px rgba(255,220,80,1));
  animation: moonCelebrate 0.75s ease infinite alternate;
}

/* ── HEADER ────────────────────────────────────────────────── */
#header {
  position: fixed; top: 0; left: var(--sb-w); right: 0; height: var(--hh);
  display: flex; align-items: center; gap: 8px; padding: 0 14px;
  background: rgba(255,255,255,0.55);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  border-bottom: 3px solid rgba(255,255,255,0.8); z-index: 100;
}
#levelDisplay {
  font-size: 15px; font-weight: bold; color: #7c5cbf;
  background: rgba(255,255,255,0.7); padding: 5px 12px;
  border-radius: 30px; white-space: nowrap; flex-shrink: 0;
}
#taskText {
  font-size: 18px; font-weight: bold; color: #333;
  text-shadow: 1px 1px 0 #fff; text-align: center;
  flex: 1; line-height: 1.25; min-width: 0;
}
@media (min-width: 640px) { #taskText { font-size: 22px; } }
@media (min-width: 900px) { #taskText { font-size: 25px; } }

#rightHeader { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
#scoreDisplay {
  font-size: 17px; background: rgba(255,255,255,0.7);
  padding: 5px 12px; border-radius: 30px;
}
#muteBtn {
  font-size: 20px; background: rgba(255,255,255,0.7);
  border: 2px solid rgba(255,255,255,0.9); border-radius: 50%;
  min-width: 40px; min-height: 40px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}

/* ── GAME AREA ─────────────────────────────────────────────── */
#gameArea {
  position: fixed;
  top: var(--hh); left: var(--sb-w); right: 0; bottom: var(--bh);
  touch-action: none;
  overflow: hidden;
}

/* ── ZONE HINTS (mobile only) ──────────────────────────────── */
.zone-hint {
  position: absolute; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 2;
  font-size: 11px; font-weight: bold;
  color: rgba(120,80,180,0.38); letter-spacing: 0.5px;
}

/* ── DRAG OBJECTS ──────────────────────────────────────────── */
.drag-obj {
  position: absolute; cursor: grab;
  display: flex; align-items: center; justify-content: center;
  z-index: 50; line-height: 1;
  touch-action: none;
  animation: idleWiggle 3.2s ease-in-out infinite;
  transition: filter 0.15s;
  will-change: transform;
}
.drag-obj:nth-child(odd)  { animation-delay: -1.5s; }
.drag-obj:nth-child(3n+1) { animation-delay: -0.7s; }
@keyframes idleWiggle {
  0%,100% { transform: rotate(0deg) scale(1); }
  25%      { transform: rotate(4deg) scale(1.04); }
  75%      { transform: rotate(-4deg) scale(1.04); }
}
.drag-obj:hover {
  transform: scale(1.2) rotate(6deg) !important;
  filter: drop-shadow(0 5px 14px rgba(0,0,0,0.28));
  animation: none !important;
}
.drag-obj.dragging {
  cursor: grabbing;
  transform: scale(1.32) !important;
  filter: drop-shadow(0 8px 26px rgba(0,0,0,0.38));
  z-index: 500; transition: none; animation: none !important;
}
.drag-obj.matched {
  pointer-events: none;
  animation: matchedDisappear 0.55s ease forwards !important;
}
@keyframes matchedDisappear {
  0%   { opacity: 1; transform: scale(1); }
  45%  { transform: scale(1.45); }
  100% { opacity: 0; transform: scale(0) rotate(180deg); }
}
.drag-obj.enter { animation: enterBounce 0.55s ease both !important; }
@keyframes enterBounce {
  0%   { transform: scale(0) translateY(22px); opacity: 0; }
  68%  { transform: scale(1.18) translateY(-4px); opacity: 1; }
  100% { transform: scale(1) translateY(0); }
}

/* ── DROP TARGETS ──────────────────────────────────────────── */
.drop-target {
  position: absolute;
  display: flex; align-items: center; justify-content: center;
  border: 4px dashed rgba(170,170,170,0.44); border-radius: 16px;
  background: rgba(255,255,255,0.3);
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.25s;
  z-index: 20;
}
.drop-target.enter { animation: enterFade 0.45s ease both; }
@keyframes enterFade {
  from { opacity: 0; transform: scale(0.65); }
  to   { opacity: 1; transform: scale(1); }
}
.drop-target.hovered {
  border-color: #7bc67e; background: rgba(123,198,126,0.2);
  box-shadow: 0 0 24px rgba(123,198,126,0.6); transform: scale(1.07);
}
.drop-target.matched {
  border-color: #4CAF50; background: rgba(76,175,80,0.16);
  animation: matchGlow 1.1s ease infinite alternate;
}
@keyframes matchGlow {
  from { box-shadow: 0 0 18px rgba(76,175,80,0.35); }
  to   { box-shadow: 0 0 42px rgba(76,175,80,0.88); }
}

.color-target {
  border-radius: 50%;
  border: 5px dashed rgba(180,180,180,0.5);
  transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s;
}
.color-target.hovered { transform: scale(1.1); }
.color-target.matched { border-style: solid; animation: matchGlow 1.1s ease infinite alternate; }

.number-target {
  flex-direction: column;
  background: rgba(255,255,255,0.5);
  border: 4px dashed rgba(170,170,170,0.5);
  padding: 6px;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
}
.number-target.hovered {
  border-color: #7bc67e; background: rgba(123,198,126,0.2);
  box-shadow: 0 0 22px rgba(123,198,126,0.6);
}
.number-target.matched {
  border-color: #4CAF50; background: rgba(76,175,80,0.16);
  animation: matchGlow 1.1s ease infinite alternate;
}

/* ── START SCREEN ──────────────────────────────────────────── */
#startScreen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(255,255,255,0.68);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
}
#startScreen p {
  font-size: 16px; color: #7c5cbf; margin-bottom: 28px;
  text-align: center; line-height: 1.6; padding: 0 24px;
}
@media (min-width: 500px) { #startScreen p { font-size: 20px; } }
#startBtn {
  font-family: inherit; font-size: 24px; padding: 16px 50px;
  background: linear-gradient(135deg, #ff6b9d, #ff9ecd);
  color: white; border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,157,0.5);
  animation: pulseShadow 2s ease infinite;
  touch-action: manipulation; min-height: 60px;
}
@keyframes pulseShadow {
  0%,100% { box-shadow: 0 6px 20px rgba(255,107,157,0.5); }
  50%      { box-shadow: 0 6px 40px rgba(255,107,157,0.85), 0 0 60px rgba(255,107,157,0.2); }
}

/* ── LEVEL COMPLETE ────────────────────────────────────────── */
#levelComplete {
  position: fixed; inset: 0; z-index: 1000;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: rgba(255,255,255,0.75);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
}
#levelComplete h2 {
  font-size: clamp(32px, 8vw, 56px); color: #ff6b9d;
  text-shadow: 4px 4px 0 #fff, 6px 6px 0 #ffb3d1;
  text-align: center; animation: bounceIn 0.65s ease;
}
.lc-stars { font-size: clamp(36px, 8vw, 50px); animation: starSpin 0.85s ease; }
#nextLevelBtn {
  font-family: inherit; font-size: clamp(18px, 4.5vw, 27px);
  padding: 15px 44px;
  background: linear-gradient(135deg, #ff6b9d, #ff9ecd);
  color: white; border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,157,0.5);
  animation: bounce 0.85s ease infinite alternate;
  touch-action: manipulation; min-height: 56px;
}

/* ── WIN SCREEN ────────────────────────────────────────────── */
#winScreen {
  position: fixed; inset: 0; z-index: 1001;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: linear-gradient(135deg, rgba(255,209,220,0.9), rgba(200,230,255,0.9));
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
}
#winScreen .trophy { font-size: clamp(70px,16vw,106px); animation: starSpin 1s ease; }
#winScreen h1 {
  font-size: clamp(28px, 7vw, 50px); color: #ff6b9d;
  text-shadow: 3px 3px 0 #fff; text-align: center; animation: bounceIn 0.8s ease;
}
#winScreen .finalScore {
  font-size: clamp(16px, 4vw, 24px); color: #7c5cbf;
  text-align: center; padding: 0 20px; line-height: 1.6;
}
#replayBtn {
  font-family: inherit; font-size: clamp(16px, 4vw, 24px);
  padding: 14px 44px;
  background: linear-gradient(135deg, #7bc67e, #a8e6a3);
  color: white; border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(123,198,126,0.5);
  touch-action: manipulation; min-height: 56px;
}
#replayBtn:active { transform: scale(0.96); }

/* ── SHARED KEYFRAMES ──────────────────────────────────────── */
@keyframes bounceIn {
  0%   { transform: scale(0.3); opacity: 0; }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes starSpin {
  from { transform: scale(0) rotate(-180deg); }
  to   { transform: scale(1) rotate(0); }
}
@keyframes bounce {
  from { transform: translateY(0); }
  to   { transform: translateY(-8px); }
}

/* ── FX ────────────────────────────────────────────────────── */
.feedback-text {
  position: fixed; font-weight: bold;
  font-size: clamp(28px, 8vw, 46px);
  color: #ff6b9d; text-shadow: 2px 2px 0 #fff;
  pointer-events: none; z-index: 800;
  animation: floatUp 1.2s ease forwards;
  white-space: nowrap;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-110px) scale(1.5); }
}
.confetti-bit {
  position: fixed; width: 10px; height: 10px; border-radius: 3px;
  pointer-events: none; z-index: 700;
  animation: confettiFall 1.5s ease forwards;
}
@keyframes confettiFall {
  0%   { opacity: 1; transform: translate(0,0) rotate(0); }
  100% { opacity: 0; transform: translate(var(--tx),var(--ty)) rotate(540deg) scale(0.2); }
}
.sparkle {
  position: fixed; pointer-events: none; z-index: 600; font-size: 13px;
  animation: sparkleFade 0.6s ease forwards;
}
@keyframes sparkleFade {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.2) translate(var(--sx),var(--sy)); }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebarLabel">⭐ Punkte</div>
  <div id="starList"></div>
  <div id="sidebarMoon">🌝</div>
</div>

<!-- BOTTOM BAR (phone) -->
<div id="bottomBar">
  <div id="bbLabel">Lv 1/20</div>
  <div id="bbTrack"></div>
  <div id="bbMoon">🌝</div>
</div>

<!-- START SCREEN -->
<div id="startScreen">
  <svg id="titleSvg" viewBox="0 0 680 150" style="width:min(680px,90vw);margin-bottom:10px">
    <defs><path id="arc" d="M 24,124 Q 340,-18 656,124"/></defs>
    <text font-family="'Chalkboard SE','Comic Sans MS',cursive" font-size="52" font-weight="bold"
          fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.55)" stroke-width="9">
      <textPath href="#arc" startOffset="50%" text-anchor="middle">Leyla's Kreativstudio</textPath>
    </text>
    <text font-family="'Chalkboard SE','Comic Sans MS',cursive" font-size="52" font-weight="bold">
      <textPath href="#arc" startOffset="50%" text-anchor="middle">
        <tspan fill="#ff4d4d">L</tspan><tspan fill="#ff8c00">e</tspan><tspan fill="#ffd700">y</tspan><tspan fill="#7bc67e">l</tspan><tspan fill="#4da6ff">a</tspan><tspan fill="#b366ff">'</tspan><tspan fill="#ff4d4d">s</tspan><tspan fill="rgba(0,0,0,0)"> </tspan><tspan fill="#ff8c00">K</tspan><tspan fill="#ffd700">r</tspan><tspan fill="#7bc67e">e</tspan><tspan fill="#4da6ff">a</tspan><tspan fill="#b366ff">t</tspan><tspan fill="#ff4d4d">i</tspan><tspan fill="#ff8c00">v</tspan><tspan fill="#ffd700">s</tspan><tspan fill="#7bc67e">t</tspan><tspan fill="#4da6ff">u</tspan><tspan fill="#b366ff">d</tspan><tspan fill="#ff4d4d">i</tspan><tspan fill="#ff8c00">o</tspan>
      </textPath>
    </text>
  </svg>
  <p>20 Rätsel warten auf dich! 🎮<br>Sammel alle Sterne und berühre den Mond! 🌝</p>
  <button id="startBtn" onclick="startGame()">▶ Spielen!</button>
</div>

<!-- HEADER -->
<div id="header">
  <div id="levelDisplay">Level 1/20</div>
  <div id="taskText">...</div>
  <div id="rightHeader">
    <div id="scoreDisplay">⭐ 0</div>
    <button id="muteBtn" onclick="toggleMute()">🔊</button>
  </div>
</div>

<!-- GAME AREA -->
<div id="gameArea"></div>

<!-- LEVEL COMPLETE -->
<div id="levelComplete">
  <h2 id="lcText">Level 1 geschafft! 🎉</h2>
  <div class="lc-stars" id="lcStars">⭐⭐⭐</div>
  <button id="nextLevelBtn" onclick="nextLevel()">Nächstes Level →</button>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <div class="trophy">🏆</div>
  <h1>DU HAST ES GESCHAFFT! 🎊</h1>
  <div class="finalScore" id="finalScore"></div>
  <button id="replayBtn" onclick="replay()">Nochmal spielen 🔄</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// LEVEL DATA
// ═══════════════════════════════════════════════════════════════
const TOTAL = 20;

const levels = [
  { task:'Bring die Tiere zu ihrem Essen! 🍎',
    pairs:[{drag:'🐵',target:'🍌',id:'a'},{drag:'🐰',target:'🥕',id:'b'},{drag:'🐶',target:'🦴',id:'c'}] },

  { task:'Bring die Babys zu ihren Mamas! 💕',
    pairs:[{drag:'🐥',target:'🐔',id:'a'},{drag:'🐸',target:'🐸',id:'b',dragScale:0.72,targetScale:1.3},{drag:'👶',target:'👩',id:'c'}] },

  { task:'Sortiere nach Farben! 🌈', colorLevel:true,
    pairs:[{drag:'🍎',id:'a',color:'#ff3333',label:'🔴'},{drag:'🍌',id:'b',color:'#ffcc00',label:'🟡'},
           {drag:'🥦',id:'c',color:'#22bb44',label:'🟢'},{drag:'🫐',id:'d',color:'#3366ff',label:'🔵'}] },

  { task:'Zähle und ordne zu! 🔢', numberLevel:true,
    pairs:[{drag:'⭐',id:'a',label:'1️⃣'},{drag:'🌸🌸',id:'b',label:'2️⃣'},{drag:'🐞🐞🐞',id:'c',label:'3️⃣'}] },

  { task:'Bring alles dorthin wo es hingehört! 🏡',
    pairs:[{drag:'🐟',target:'🌊',id:'a'},{drag:'🐝',target:'🌸',id:'b'},{drag:'⭐',target:'🌙',id:'c'},{drag:'🦋',target:'🌺',id:'d'}] },

  { task:'Was zieht man bei dem Wetter an? ☁️',
    pairs:[{drag:'☀️',target:'👕',id:'a'},{drag:'🌧️',target:'☂️',id:'b'},{drag:'❄️',target:'🧥',id:'c'}] },

  { task:'Wo wohnen die Tiere? 🏠',
    pairs:[{drag:'🐦',target:'🪺',id:'a'},{drag:'🐟',target:'🌊',id:'b'},{drag:'🐝',target:'🌻',id:'c'},{drag:'🐻',target:'🌲',id:'d'}] },

  { task:'Was gehört zusammen? ✨',
    pairs:[{drag:'🌙',target:'⭐',id:'a'},{drag:'☀️',target:'🌈',id:'b'},{drag:'🌊',target:'⛵',id:'c'},{drag:'🌸',target:'🦋',id:'d'}] },

  { task:'Wohin fährt das Fahrzeug? 🚀',

// ═══════════════════════════════════════════════════════════════
// LAYOUT HELPERS
// ═══════════════════════════════════════════════════════════════
function getLayout() {
  const w = window.innerWidth;
  // Returns sizes in px and layout mode
  if (w < 640) return { mobile: true,  es: 48, ow: 64, th: 36, tfs: '42px', numFs: '40px', margin: 68  };
  if (w < 900) return { mobile: false, es: 66, ow: 88, th: 52, tfs: '66px', numFs: '56px', margin: 94  };
  return              { mobile: false, es: 82, ow: 106,th: 62, tfs: '82px', numFs: '72px', margin: 118 };
  // es=emoji-size, ow=obj-width, th=target-half (target-size/2), tfs=target-font-size
}

function gameRect() {
  return document.getElementById('gameArea').getBoundingClientRect();
}

function initProgressUI() {
  // Sidebar stars
  const list = document.getElementById('starList');
  list.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const s = document.createElement('div');
    s.className = 'star-slot'; s.id = `star-${i}`;
    list.appendChild(s);
  }
  // Bottom bar dots
  const track = document.getElementById('bbTrack');
  track.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'bb-dot'; d.id = `dot-${i}`;
    track.appendChild(d);
  }
}

function lightUpProgress(idx) {
  // Sidebar
  const slot = document.getElementById(`star-${idx}`);
  if (slot && !slot.classList.contains('lit')) {
    slot.classList.add('lit');
    setTimeout(() => slot.classList.add('lit-glow'), 700);
    const r = slot.getBoundingClientRect();
    spawnConfetti(r.left + r.width/2, r.top + r.height/2, 10);
  }
  // Bottom bar
  const dot = document.getElementById(`dot-${idx}`);
  if (dot) dot.classList.add('lit');
  // Update label
  document.getElementById('bbLabel').textContent = `Lv ${idx+1}/20`;

  if (idx === TOTAL - 1) {
    setTimeout(() => {
      document.getElementById('sidebarMoon').classList.add('reached');
      document.getElementById('bbMoon').classList.add('reached');
      const sbR = document.getElementById('sidebarMoon').getBoundingClientRect();
      for (let i = 0; i < 6; i++)
        setTimeout(() => spawnConfetti(sbR.left + sbR.width/2, sbR.top + sbR.height/2, 14), i * 200);
    }, 900);
  }
}

function initAudio() {
  if (audioStarted) return;
  audioStarted = true;
  melodySynth = new Tone.Synth({
    oscillator: { type: 'triangle' },
    envelope:   { attack:0.05, decay:0.2, sustain:0.4, release:0.8 },
    volume: -18
  }).toDestination();

  const notes = ['C5','E5','G5','E5','C5','D5','E5','D5','C5','G4','A4','B4','C5'];
  melody = new Tone.Sequence((t,n) => melodySynth.triggerAttackRelease(n,'8n',t), notes, '4n');
  melody.loop = true;
  Tone.Transport.bpm.value = 104;
  melody.start(0);
  Tone.Transport.start();

  successSynth = new Tone.PolySynth(Tone.Synth, {
    oscillator: { type:'sine' },
    envelope:   { attack:0.02, decay:0.1, sustain:0.3, release:0.5 },
    volume: -10
  }).toDestination();

  failSynth = new Tone.Synth({
    oscillator: { type:'sine' },
    envelope:   { attack:0.05, decay:0.3, sustain:0, release:0.3 },
    volume: -12
  }).toDestination();
}

function playSuccess() {
  if (muted || !audioStarted) return;
  successSynth.triggerAttackRelease(['C5','E5','G5'],'8n');
  setTimeout(() => successSynth.triggerAttackRelease(['E5','G5','C6'],'4n'), 150);
}
function playFail() {
  if (muted || !audioStarted) return;
  failSynth.triggerAttackRelease('A3','4n');
}
function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
  if (muted) Tone.Transport.pause(); else Tone.Transport.start();
}

function loadLevel(n) {

  document.getElementById('taskText').textContent = levels[n-1].task;

  updateScore();

  const lv  = levels[n-1];

  const r   = gameRect();

  if (lv.colorLevel)       buildColor(lv, lay, W, H);
  else if (lv.numberLevel) buildNumber(lv, lay, W, H);
  else                     buildNormal(lv, lay, W, H);
}

// ═══════════════════════════════════════════════════════════════
// LEVEL BUILDERS
// ═══════════════════════════════════════════════════════════════
function dragTargetZones(lay, W, H) {
  if (lay.mobile) {
    // Phone: targets top 44%, drags bottom 46%
    const tH = Math.floor(H * 0.44);
    const dY = Math.floor(H * 0.54);
    const dH = H - dY;
    return { targW:W, targH:tH, targX:0, targY:0,
             dragX0:6, dragX1:W-lay.ow-6, dragY0:dY+4, dragY1:dY+dH-lay.ow-4 };
  } else {
    // Desktop/tablet: drags left 43%, targets right 48%
    const lW = Math.floor(W * 0.43);
    const rX = Math.floor(W * 0.52);
    const rW = W - rX - 10;
    return { targW:rW, targH:H, targX:rX, targY:0,
             dragX0:8, dragX1:lW-lay.ow-8, dragY0:8, dragY1:H-lay.ow-8 };
  }
}

function buildNormal(lv, lay, W, H) {
  const area  = document.getElementById('gameArea');
  const zones = dragTargetZones(lay, W, H);
  const tSize = lay.th * 2;

  addZoneHints(lay, W, H, area);

  const pos = scatter(lv.pairs.length, zones.dragX0, zones.dragX1, zones.dragY0, zones.dragY1, lay.margin);
  lv.pairs.forEach((p, i) => {
    // Drag
    const d = makeDrag(p, i, lay);
    d.style.left = pos[i].x + 'px'; d.style.top = pos[i].y + 'px';
    area.appendChild(d); makeDraggable(d);
    // Target
    const t = makeTgt(p, i, lay, tSize);
    t.style.fontSize = p.targetScale ? (lay.es * p.targetScale) + 'px' : lay.tfs;
    t.textContent = p.target || '';
    const g = gridPos(i, lv.pairs.length, zones.targX, zones.targW, zones.targH, zones.targY, lay.th);
    t.style.left = g.x + 'px'; t.style.top = g.y + 'px';
    area.appendChild(t);
  });
}

function buildColor(lv, lay, W, H) {
  const area  = document.getElementById('gameArea');
  const zones = dragTargetZones(lay, W, H);
  const tSize = lay.th * 2;

  addZoneHints(lay, W, H, area);

  const pos = scatter(lv.pairs.length, zones.dragX0, zones.dragX1, zones.dragY0, zones.dragY1, lay.margin);
  lv.pairs.forEach((p, i) => {
    const d = makeDrag(p, i, lay);
    d.style.left = pos[i].x + 'px'; d.style.top = pos[i].y + 'px';
    area.appendChild(d); makeDraggable(d);

    const t = makeTgt(p, i, lay, tSize);
    t.classList.add('color-target');
    t.style.background  = hexRgba(p.color, 0.2);
    t.style.borderColor = p.color;
    t.style.boxShadow   = `0 0 18px ${hexRgba(p.color, 0.25)}`;
    t.style.fontSize    = Math.round(lay.th * 0.9) + 'px';
    t.textContent = p.label;
    const g = gridPos(i, lv.pairs.length, zones.targX, zones.targW, zones.targH, zones.targY, lay.th);
    t.style.left = g.x + 'px'; t.style.top = g.y + 'px';
    area.appendChild(t);
  });
}

function buildNumber(lv, lay, W, H) {
  const area  = document.getElementById('gameArea');
  const zones = dragTargetZones(lay, W, H);
  const tSize = Math.round(lay.th * 2.1);

  addZoneHints(lay, W, H, area);

  const pos = scatter(lv.pairs.length, zones.dragX0, zones.dragX1, zones.dragY0, zones.dragY1, lay.margin);
  lv.pairs.forEach((p, i) => {
    const d = makeDrag(p, i, lay);
    const rawLen = [...p.drag].filter(c => c.trim()).length;
    const numFs  = rawLen >= 4 ? Math.round(lay.es*0.45) : rawLen >= 3 ? Math.round(lay.es*0.56) :
                   rawLen >= 2 ? Math.round(lay.es*0.68) : lay.es;
    d.style.fontSize = numFs + 'px';
    d.style.width    = (lay.ow * 1.3) + 'px';
    d.style.left = pos[i].x + 'px'; d.style.top = pos[i].y + 'px';
    area.appendChild(d); makeDraggable(d);

    const t = makeTgt(p, i, lay, tSize);
    t.classList.add('number-target');
    t.style.fontSize = Math.round(lay.th * 0.85) + 'px';
    t.textContent = p.label;
    const g = gridPos(i, lv.pairs.length, zones.targX, zones.targW, zones.targH, zones.targY, lay.th+2);
    t.style.left = g.x + 'px'; t.style.top = g.y + 'px';
    area.appendChild(t);
  });
}

function addZoneHints(lay, W, H, area) {
  if (!lay.mobile) return;
  const tH = Math.floor(H * 0.44);
  const dY = Math.floor(H * 0.54);
  // Separator
  const sep = document.createElement('div');
  sep.style.cssText = `position:absolute;left:8%;right:8%;top:${tH+2}px;height:${dY-tH-4}px;
    display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:5;
    font-size:12px;color:rgba(120,80,180,0.4);font-weight:bold;letter-spacing:0.5px;`;
  sep.textContent = '↑ hierhin ziehen ↑';
  area.appendChild(sep);
  // Divider line
  const line = document.createElement('div');
  line.style.cssText = `position:absolute;left:5%;right:5%;top:${Math.floor((tH+dY)/2)}px;
    height:1px;border-top:2px dashed rgba(180,140,220,0.2);pointer-events:none;z-index:4;`;
  area.appendChild(line);
}

// ─── Element factories ──────────────────────────────────────
function makeDrag(p, i, lay) {
  const d = document.createElement('div');
  d.className = 'drag-obj enter';
  d.dataset.id = p.id;
  d.textContent = p.drag;
  d.style.width    = lay.ow + 'px';
  d.style.height   = lay.ow + 'px';
  d.style.fontSize = p.dragScale ? Math.round(lay.es * p.dragScale) + 'px' : lay.es + 'px';
  d.style.animationDelay = (i * 0.08) + 's';
  return d;
}

function makeTgt(p, i, lay, size) {
  const t = document.createElement('div');
  t.className = 'drop-target enter';
  t.dataset.targetId = p.id;
  t.style.width  = size + 'px';
  t.style.height = size + 'px';
  t.style.animationDelay = (0.18 + i * 0.08) + 's';
  return t;
}

// ─── Positioning ────────────────────────────────────────────
function gridPos(i, total, startX, width, height, startY, half) {
  const cols = total === 6 ? 3 : (total <= 3 ? 1 : 2);
  const rows = Math.ceil(total / cols);
  const col  = i % cols, row = Math.floor(i / cols);
  const cw = width / cols, ch = height / rows;
  return { x: startX + col*cw + cw/2 - half, y: startY + row*ch + ch/2 - half };
}

function scatter(count, x0, x1, y0, y1, margin) {
  const out = []; let tries = 0;
  const safeX1 = Math.max(x0+2, x1), safeY1 = Math.max(y0+2, y1);
  while (out.length < count && tries < 4000) {
    tries++;
    const x = ri(x0, safeX1), y = ri(y0, safeY1);
    if (!out.some(p => Math.abs(p.x-x) < margin && Math.abs(p.y-y) < margin))
      out.push({x, y});
  }
  // Fallback: if not enough positions found, place in a grid
  if (out.length < count) {
    const gridCols = Math.ceil(Math.sqrt(count));
    const cellW = (safeX1 - x0) / gridCols;
    const cellH = (safeY1 - y0) / Math.ceil(count / gridCols);
    for (let j = out.length; j < count; j++) {
      const col = j % gridCols, row = Math.floor(j / gridCols);
      out.push({ x: x0 + col*cellW + cellW/2 - 20, y: y0 + row*cellH + cellH/2 - 20 });
    }
  }
  return out;
}

function ri(a, b) { return Math.floor(Math.random() * Math.max(1, b-a)) + a; }
function hexRgba(h, a) {
  const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ═══════════════════════════════════════════════════════════════
// DRAG & DROP ENGINE
// ═══════════════════════════════════════════════════════════════
function makeDraggable(el) {
  let sx, sy, ox, oy, on = false, sparkTimer = null;

  el.addEventListener('mousedown',  startDrag);
  el.addEventListener('touchstart', startDrag, {passive:false});

  function startDrag(e) {
    e.preventDefault(); on = true;
    el.classList.add('dragging');
    const pt = e.touches ? e.touches[0] : e;
    sx = pt.clientX; sy = pt.clientY;
    ox = parseFloat(el.style.left)||0; oy = parseFloat(el.style.top)||0;
    document.addEventListener('mousemove',  moveDrag);
    document.addEventListener('mouseup',    endDrag);
    document.addEventListener('touchmove',  moveDrag, {passive:false});
    document.addEventListener('touchend',   endDrag);
    document.addEventListener('touchcancel',endDrag);
    sparkTimer = setInterval(() => spawnSparkle(el), 90);
  }

  function moveDrag(e) {
    if (!on) return; e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    el.style.left = (ox + pt.clientX - sx) + 'px';
    el.style.top  = (oy + pt.clientY - sy) + 'px';
    document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('hovered'));
    const h = findHovered(el); if (h) h.classList.add('hovered');
  }

  function endDrag(e) {
    if (!on) return; on = false;
    el.classList.remove('dragging');
    clearInterval(sparkTimer);
    document.removeEventListener('mousemove',  moveDrag);
    document.removeEventListener('mouseup',    endDrag);
    document.removeEventListener('touchmove',  moveDrag);
    document.removeEventListener('touchend',   endDrag);
    document.removeEventListener('touchcancel',endDrag);
    document.querySelectorAll('.drop-target').forEach(t => t.classList.remove('hovered'));
    const t = findHovered(el);
    if (t && t.dataset.targetId === el.dataset.id && !t.classList.contains('matched'))
      onCorrect(el, t);
    else
      onWrong(el, ox, oy);
  }
}

function findHovered(el) {
  const d = el.getBoundingClientRect();
  for (const t of document.querySelectorAll('.drop-target')) {
    if (t.classList.contains('matched')) continue;
    const r = t.getBoundingClientRect();
    if (d.left<r.right && d.right>r.left && d.top<r.bottom && d.bottom>r.top) return t;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// DROP RESULTS
// ═══════════════════════════════════════════════════════════════
function onCorrect(dragEl, tgtEl) {
  score++; updateScore(); playSuccess();
  const r = tgtEl.getBoundingClientRect();
  spawnConfetti(r.left+r.width/2, r.top+r.height/2);
  const msgs = ['JUHU! 🎉','SUPER! ⭐','TOLL! 🌟','YEAH! 🥳','PRIMA! 💖','BRAVO! 👏','WOW! ✨'];
  spawnFeedback(r.left+r.width/2, r.top, msgs[ri(0,msgs.length)]);
  dragEl.classList.add('matched');
  tgtEl.classList.add('matched'); tgtEl.classList.remove('hovered');
  setTimeout(checkDone, 650);
}

function onWrong(el, ox, oy) {
  playFail();
  el.style.transition = 'left 0.48s ease, top 0.48s ease';
  el.style.left = ox+'px'; el.style.top = oy+'px';
  setTimeout(() => { el.style.transition = ''; }, 550);
}

function checkDone() {
  if (document.querySelectorAll('.drag-obj:not(.matched)').length > 0) return;
  setTimeout(() => {
    lightUpProgress(currentLevel - 1);
    setTimeout(() => {
      const last = currentLevel === TOTAL;
      document.getElementById('lcText').textContent  = last ? 'ALLE LEVEL GESCHAFFT! 🎊' : `Level ${currentLevel} geschafft! 🎉`;
      document.getElementById('lcStars').textContent = last ? '🌟🌟🌟🌟🌟' : '⭐⭐⭐';
      document.getElementById('nextLevelBtn').textContent = last ? 'Zum Finale! 🏆' : 'Nächstes Level →';
      document.getElementById('levelComplete').style.display = 'flex';
      spawnConfetti(window.innerWidth/2, window.innerHeight/2, 40);
    }, 650);
  }, 300);
}

function nextLevel() {
  if (currentLevel >= TOTAL) showWin();
  else loadLevel(currentLevel + 1);
}

function showWin() {
  document.getElementById('levelComplete').style.display = 'none';
  document.getElementById('winScreen').style.display = 'flex';
  document.getElementById('finalScore').textContent =
    `Alle ${TOTAL} Level bestanden! 🏆\nDu hast ${score} Sterne gesammelt!`;
  for (let i = 0; i < 9; i++)
    setTimeout(() => spawnConfetti(ri(80,window.innerWidth-80), ri(60,window.innerHeight-60), 22), i*220);
}

function replay() {
  score = 0; updateScore();
  document.getElementById('winScreen').style.display = 'none';
  document.querySelectorAll('.star-slot').forEach(s => s.classList.remove('lit','lit-glow'));
  document.querySelectorAll('.bb-dot').forEach(d => d.classList.remove('lit'));
  document.getElementById('sidebarMoon').classList.remove('reached');
  document.getElementById('bbMoon').classList.remove('reached');
  loadLevel(1);
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent = `⭐ ${score}`;
}

// VISUAL FX
// ═══════════════════════════════════════════════════════════════
const CC = ['#ff6b9d','#ffd700','#7bc67e','#64b5f6','#ff8a65','#ba68c8','#4dd0e1','#fff176','#ffb3d1'];

function spawnConfetti(cx, cy, n=22) {
  for (let i = 0; i < n; i++) {
    const b = document.createElement('div');
    b.className = 'confetti-bit';
    b.style.cssText = `left:${cx}px;top:${cy}px;background:${CC[ri(0,CC.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};animation-delay:${(Math.random()*.18).toFixed(2)}s;`;
    const a = Math.random()*Math.PI*2, d = 65+Math.random()*150;
    b.style.setProperty('--tx', (Math.cos(a)*d).toFixed(0)+'px');
    b.style.setProperty('--ty', (Math.sin(a)*d-68).toFixed(0)+'px');
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 2100);
  }
}

function spawnFeedback(cx, cy, txt) {
  const el = document.createElement('div');
  el.className = 'feedback-text';
  el.textContent = txt;
  el.style.left = Math.max(60, Math.min(cx-70, window.innerWidth-160))+'px';
  el.style.top  = (cy-16)+'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1350);
}

function spawnSparkle(el) {
  const r = el.getBoundingClientRect();
  if (r.width === 0) return;
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.textContent = ['✨','⭐','💫','🌟'][ri(0,4)];
  sp.style.left = (r.left + ri(0, r.width)) + 'px';
  sp.style.top  = (r.top  + ri(0, r.height)) + 'px';
  sp.style.setProperty('--sx', ri(-20,20)+'px');
  sp.style.setProperty('--sy', ri(-28,8)+'px');
  document.body.appendChild(sp);
  setTimeout(() => sp.remove(), 680);
}

// ═══════════════════════════════════════════════════════════════
// RESIZE HANDLER
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (document.getElementById('startScreen').style.display === 'none' &&
        document.getElementById('winScreen').style.display !== 'flex') {
      loadLevel(currentLevel);
    }
  }, 280);
});

// Also handle orientation change on mobile
window.addEventListener('orientationchange', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => loadLevel(currentLevel), 400);
});

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
initProgressUI();
</script>
</body>
</html>
