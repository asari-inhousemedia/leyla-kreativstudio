<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leyla's Kreativstudio V2 ✨</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Chalkboard SE', 'Comic Sans MS', cursive;
  min-height: 100vh; overflow: hidden; user-select: none;
  background: linear-gradient(135deg, #ffd1dc, #c8e6ff, #d4f5c4, #fff3b0);
  background-size: 400% 400%;
  animation: bgShift 8s ease infinite;
}
@keyframes bgShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* SIDEBAR */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 86px;
  background: rgba(255,255,255,0.52); backdrop-filter: blur(14px);
  border-right: 3px solid rgba(255,255,255,0.85);
  z-index: 200; display: flex; flex-direction: column;
  align-items: center; padding: 10px 0 12px;
}
#sidebarLabel { font-size: 10px; font-weight: bold; color: #9c7cd4; letter-spacing: 0.5px; margin-bottom: 4px; text-align: center; }
#starList { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-around; width: 100%; padding: 2px 0; }
.star-slot { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 14px; opacity: 0.15; transition: opacity 0.6s, filter 0.6s; }
.star-slot::after { content: '⭐'; }
.star-slot.lit { opacity: 1; filter: drop-shadow(0 0 5px rgba(255,215,0,0.9)); animation: starPop 0.65s ease both; }
.star-slot.lit-glow { filter: drop-shadow(0 0 8px gold) drop-shadow(0 0 18px rgba(255,180,0,0.55)); }
@keyframes starPop {
  0%   { transform: scale(0) rotate(-200deg); opacity: 0; }
  65%  { transform: scale(1.55) rotate(15deg); opacity: 1; }
  82%  { transform: scale(0.88) rotate(-4deg); }
  100% { transform: scale(1) rotate(0); }
}
#sidebarMoon { font-size: 38px; margin-top: 6px; line-height: 1; filter: grayscale(0.65) brightness(0.82); transition: filter 1.4s ease; animation: moonBob 4s ease-in-out infinite; }
#sidebarMoon.reached { filter: drop-shadow(0 0 22px rgba(255,225,80,1)) drop-shadow(0 0 40px rgba(255,180,0,.6)); animation: moonCelebrate 0.75s ease infinite alternate; }
@keyframes moonBob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-6px) rotate(4deg); } }
@keyframes moonCelebrate { from { transform: scale(1) rotate(-14deg); } to { transform: scale(1.22) rotate(14deg); } }

/* START */
#startScreen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(255,255,255,0.68); backdrop-filter: blur(8px); z-index: 9999;
}
#startScreen p { font-size: 19px; color: #7c5cbf; margin-bottom: 30px; text-align: center; line-height: 1.7; }
#startBtn {
  font-family: inherit; font-size: 28px; padding: 18px 54px;
  background: linear-gradient(135deg, #ff6b9d, #ff9ecd);
  color: #fff; border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,107,157,0.5);
  animation: pulseShadow 2s ease infinite; transition: transform 0.2s;
}
#startBtn:hover { transform: scale(1.08); }
@keyframes pulseShadow {
  0%,100% { box-shadow: 0 6px 20px rgba(255,107,157,0.5); }
  50%      { box-shadow: 0 6px 40px rgba(255,107,157,0.85), 0 0 60px rgba(255,107,157,0.25); }
}

/* HEADER */
#header {
  position: fixed; top: 0; left: 86px; right: 0; height: 74px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px); border-bottom: 3px solid rgba(255,255,255,0.8); z-index: 100;
}
#levelDisplay { font-size: 17px; font-weight: bold; color: #7c5cbf; background: rgba(255,255,255,0.7); padding: 5px 14px; border-radius: 30px; white-space: nowrap; }
#gameTypeBadge { font-size: 12px; font-weight: bold; padding: 4px 10px; border-radius: 20px; margin-left: 7px; background: rgba(255,255,255,0.7); color: #555; white-space: nowrap; }
#taskText { font-size: 21px; font-weight: bold; color: #333; text-shadow: 2px 2px 0 #fff; text-align: center; flex: 1; padding: 0 12px; line-height: 1.25; }
#rightHeader { display: flex; align-items: center; gap: 9px; }
#scoreDisplay { font-size: 19px; background: rgba(255,255,255,0.7); padding: 5px 14px; border-radius: 30px; min-width: 70px; text-align: center; }
#muteBtn { font-size: 23px; background: rgba(255,255,255,0.7); border: 2px solid rgba(255,255,255,0.9); border-radius: 50%; width: 44px; height: 44px; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
#muteBtn:hover { transform: scale(1.15); }

/* GAME AREA */
#gameArea { position: fixed; top: 74px; left: 86px; right: 0; bottom: 0; }

/* DRAG OBJECTS */
.drag-obj {
  position: absolute; font-size: 86px; cursor: grab; z-index: 50;
  line-height: 1; display: flex; align-items: center; justify-content: center;
  width: 108px; height: 108px;
  animation: idleWiggle 3.2s ease-in-out infinite; transition: filter 0.15s;
}
.drag-obj:nth-child(odd) { animation-delay: -1.6s; }
.drag-obj:nth-child(3n)  { animation-delay: -0.8s; }
@keyframes idleWiggle {
  0%,100% { transform: rotate(0deg) scale(1); }
  25%      { transform: rotate(4deg) scale(1.04); }
  75%      { transform: rotate(-4deg) scale(1.04); }
}
.drag-obj:hover  { transform: scale(1.2) rotate(6deg) !important; filter: drop-shadow(0 5px 14px rgba(0,0,0,0.28)); animation: none !important; }
.drag-obj.dragging { cursor: grabbing; transform: scale(1.33) !important; filter: drop-shadow(0 8px 26px rgba(0,0,0,0.38)); z-index: 500; transition: none; animation: none !important; }
.drag-obj.matched  { pointer-events: none; animation: matchedDisappear 0.55s ease forwards !important; }
@keyframes matchedDisappear {
  0%   { opacity: 1; transform: scale(1); }
  45%  { transform: scale(1.45); }
  100% { opacity: 0; transform: scale(0) rotate(180deg); }
}
.drag-obj.enter { animation: enterBounce 0.55s ease both !important; }
@keyframes enterBounce {
  0%   { transform: scale(0) translateY(28px); opacity: 0; }
  68%  { transform: scale(1.18) translateY(-4px); opacity: 1; }
  100% { transform: scale(1) translateY(0); }
}

/* DROP TARGETS */
.drop-target {
  position: absolute; font-size: 86px; width: 126px; height: 126px;
  display: flex; align-items: center; justify-content: center;
  border: 4px dashed rgba(170,170,170,0.44); border-radius: 20px;
  background: rgba(255,255,255,0.3);
  transition: border-color .28s, background .28s, box-shadow .28s, transform .28s; z-index: 20;
}
.drop-target.enter { animation: enterFade 0.45s ease both; }
@keyframes enterFade { from { opacity: 0; transform: scale(0.65); } to { opacity: 1; transform: scale(1); } }
.drop-target.hovered  { border-color: #7bc67e; background: rgba(123,198,126,0.2); box-shadow: 0 0 24px rgba(123,198,126,0.6); transform: scale(1.07); }
.drop-target.matched  { border-color: #4CAF50; background: rgba(76,175,80,0.16); animation: matchGlow 1.1s ease infinite alternate; }
@keyframes matchGlow { from { box-shadow: 0 0 18px rgba(76,175,80,0.35); } to { box-shadow: 0 0 42px rgba(76,175,80,0.88); } }

.color-target {
  position: absolute; width: 126px; height: 126px; border-radius: 50%;
  border: 5px dashed rgba(180,180,180,0.5); font-size: 48px;
  display: flex; align-items: center; justify-content: center;
  transition: box-shadow .28s, transform .28s, border-color .28s; z-index: 20;
}
.color-target.hovered { transform: scale(1.1); }
.color-target.matched { border-style: solid; animation: matchGlow 1.1s ease infinite alternate; }

.number-target {
  position: absolute; width: 140px; min-height: 140px;
  background: rgba(255,255,255,0.5); border: 4px dashed rgba(170,170,170,0.5);
  border-radius: 20px; font-size: 44px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px; z-index: 20;
  transition: border-color .28s, background .28s, box-shadow .28s;
}
.number-target.hovered { border-color: #7bc67e; background: rgba(123,198,126,0.2); box-shadow: 0 0 24px rgba(123,198,126,0.6); }
.number-target.matched { border-color: #4CAF50; background: rgba(76,175,80,0.16); animation: matchGlow 1.1s ease infinite alternate; }

/* CLICK GAME */
.click-item {
  position: absolute; font-size: 70px; width: 106px; height: 106px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 50%;
  background: rgba(255,255,255,0.25); border: 3px dashed rgba(200,200,200,0.5);
  transition: transform 0.15s, background 0.15s;
  animation: idleWiggle 3.2s ease-in-out infinite; z-index: 50;
}
.click-item:nth-child(odd) { animation-delay: -1.6s; }
.click-item:nth-child(3n)  { animation-delay: -0.9s; }
.click-item:hover { transform: scale(1.18) !important; background: rgba(255,255,255,0.55); animation: none !important; }
.click-item.hit-correct { pointer-events: none; animation: clickCorrect 0.45s ease forwards !important; }
@keyframes clickCorrect {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.5); filter: brightness(1.6) drop-shadow(0 0 14px gold); }
  100% { transform: scale(0); opacity: 0; }
}
.click-item.hit-wrong { animation: clickWrong 0.45s ease !important; background: rgba(255,60,60,0.25) !important; }
@keyframes clickWrong {
  0%,100% { transform: translateX(0) rotate(0); }
  20%      { transform: translateX(-12px) rotate(-8deg); }
  40%      { transform: translateX(12px) rotate(8deg); }
  60%      { transform: translateX(-7px) rotate(-4deg); }
  80%      { transform: translateX(7px) rotate(4deg); }
}
#clickCounter {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  font-size: 19px; font-weight: bold; background: rgba(255,255,255,0.85);
  padding: 10px 24px; border-radius: 30px; box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  z-index: 150; display: none; color: #7c5cbf;
}

/* MEMORY GAME */
.memory-card {
  position: absolute; border-radius: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border: 3px solid rgba(255,255,255,0.7);
  box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  transition: transform 0.22s, background 0.22s;
  z-index: 50; animation: enterFade 0.35s ease both;
}
.memory-card.face-down { background: linear-gradient(135deg, #a855f7, #7c3aed); color: rgba(255,255,255,0.8); }
.memory-card.face-up   { background: rgba(255,255,255,0.88); }
.memory-card.face-down:hover { transform: scale(1.1) rotate(3deg); }
.memory-card.matched-card { background: rgba(76,175,80,0.18) !important; border-color: #4CAF50 !important; pointer-events: none; animation: matchGlow 1.1s ease infinite alternate !important; }
.memory-card.flip-back { animation: flipBack 0.38s ease both !important; }
@keyframes flipBack {
  0%   { transform: rotateY(0); }
  50%  { transform: rotateY(90deg); opacity: 0.3; }
  100% { transform: rotateY(0); }
}
.memory-card.flip-reveal { animation: flipReveal 0.3s ease both !important; }
@keyframes flipReveal {
  0%   { transform: scale(0.8); }
  60%  { transform: scale(1.15); }
  100% { transform: scale(1); }
}
#memoryInfo {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  font-size: 18px; font-weight: bold; background: rgba(255,255,255,0.85);
  padding: 10px 24px; border-radius: 30px; box-shadow: 0 3px 12px rgba(0,0,0,0.12);
  z-index: 150; display: none; color: #7c5cbf; text-align: center;
}

/* SKIT OVERLAY */
#skitOverlay {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 3000; overflow: hidden;
}
#skitBg { position: absolute; inset: 0; background: rgba(255,255,255,0.88); backdrop-filter: blur(14px); }
#skitContent { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
.skit-msg { font-size: 36px; font-weight: bold; color: #ff6b9d; text-shadow: 3px 3px 0 #fff; text-align: center; margin-bottom: 8px; animation: bounceIn 0.5s ease both; }
.skit-sub { font-size: 20px; color: #7c5cbf; text-align: center; animation: bounceIn 0.5s 0.15s ease both; margin-bottom: 10px; }
.skit-scene { position: relative; width: 100vw; height: 240px; overflow: hidden; }
.skit-char { position: absolute; line-height: 1; display: flex; align-items: center; justify-content: center; }
#skitSkipBtn {
  position: fixed; bottom: 32px; right: 40px; font-family: inherit; font-size: 20px;
  padding: 12px 32px; background: linear-gradient(135deg, #ff6b9d, #ff9ecd);
  color: #fff; border: none; border-radius: 40px; cursor: pointer;
  box-shadow: 0 5px 18px rgba(255,107,157,0.45); transition: transform 0.2s;
  z-index: 3001; animation: bounceIn 0.5s 0.4s ease both;
}
#skitSkipBtn:hover { transform: scale(1.08); }

/* SKIT ANIMATIONS */
@keyframes bearDance {
  0%   { transform: translateY(200px) scale(0.5); opacity: 0; }
  20%  { transform: translateY(0) scale(1.1); opacity: 1; }
  30%  { transform: rotate(-18deg) scale(1.15); }
  40%  { transform: rotate(18deg) scale(1.1); }
  50%  { transform: rotate(-18deg) scale(1.15) translateY(-10px); }
  60%  { transform: rotate(18deg) scale(1.1); }
  70%  { transform: rotate(-12deg) scale(1.12); }
  80%  { transform: rotate(12deg) scale(1.08); }
  100% { transform: rotate(0) scale(1); }
}
@keyframes chickenRun {
  0%   { left: -130px; }
  100% { left: calc(100vw + 130px); }
}
@keyframes chickenBob {
  0%,100% { transform: rotate(-8deg) translateY(0); }
  50%      { transform: rotate(8deg) translateY(-14px); }
}
@keyframes unicornSlide {
  0%   { right: -160px; opacity: 0; transform: rotate(10deg); }
  25%  { right: calc(50% - 80px); opacity: 1; transform: rotate(-5deg); }
  65%  { right: calc(50% - 80px); transform: rotate(5deg) scale(1.1); }
  100% { right: calc(50% - 80px); transform: rotate(0) scale(1); }
}
@keyframes rainbowFly {
  0%   { opacity: 0; transform: scale(0) rotate(-30deg); }
  50%  { opacity: 1; transform: scale(1.4) rotate(15deg); }
  100% { opacity: 0; transform: scale(0.5) translate(var(--rx,0),var(--ry,-60px)) rotate(40deg); }
}
@keyframes frogJump {
  0%   { left: 10%; top: 65%; transform: scale(0.8); opacity: 0; }
  10%  { opacity: 1; }
  28%  { left: 45%; top: 5%; transform: scale(1.3) rotate(180deg); }
  52%  { left: 75%; top: 58%; transform: scale(0.9) rotate(0); }
  76%  { left: 22%; top: 18%; transform: scale(1.2) rotate(-120deg); }
  100% { left: 50%; top: 42%; transform: scale(1) rotate(0); }
}
@keyframes robotShake {
  0%   { transform: translateY(220px) rotate(0); opacity: 0; }
  15%  { transform: translateY(0) rotate(0); opacity: 1; }
  20%  { transform: rotate(-25deg) scale(1.1); filter: hue-rotate(90deg); }
  28%  { transform: rotate(25deg) scale(1.2); filter: hue-rotate(180deg); }
  35%  { transform: rotate(-20deg) scale(0.9); filter: hue-rotate(270deg); }
  42%  { transform: rotate(20deg) scale(1.15); filter: hue-rotate(360deg); }
  50%  { transform: rotate(-15deg) scale(1.1); filter: hue-rotate(90deg); }
  60%  { transform: rotate(15deg) scale(1.05); filter: hue-rotate(0); }
  72%  { transform: rotate(-10deg) scale(1.1); }
  85%  { transform: rotate(10deg) scale(1.15); }
  100% { transform: rotate(0) scale(1.1); }
}
@keyframes monkeyFall {
  0%   { transform: translateY(-160px) rotate(0) scale(0.5); opacity: 0; }
  35%  { transform: translateY(0) rotate(360deg) scale(1.2); opacity: 1; }
  55%  { transform: translateY(-50px) rotate(340deg) scale(1.1); }
  70%  { transform: translateY(0) rotate(360deg) scale(1); }
  85%  { transform: translateY(-20px) scale(1.05); }
  100% { transform: translateY(0) scale(1); }
}
@keyframes dinoWalk {
  0%   { left: -140px; }
  100% { left: calc(100vw + 140px); }
}
@keyframes dinoWalk2 {
  0%   { right: -140px; }
  100% { right: calc(100vw + 140px); }
}
@keyframes dinoBob {
  0%,100% { margin-top: 0; }
  50%      { margin-top: -18px; }
}
@keyframes wizardWave {
  0%   { transform: translateY(220px) scale(0.5); opacity: 0; }
  20%  { transform: translateY(0) scale(1); opacity: 1; }
  38%  { transform: rotate(16deg) scale(1.05); }
  52%  { transform: rotate(-12deg) scale(1.1); }
  64%  { transform: rotate(20deg) scale(1.15); }
  76%  { transform: rotate(-6deg) scale(1.1); }
  88%  { transform: rotate(10deg) scale(1.05); }
  100% { transform: rotate(0) scale(1); }
}
@keyframes starAppear {
  0%   { transform: scale(0) rotate(0); opacity: 0; }
  60%  { transform: scale(1.4) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); opacity: 0.85; }
}
@keyframes penguinWaddle {
  0%,100% { transform: rotate(-12deg) translateY(0); }
  50%      { transform: rotate(12deg) translateY(-10px); }
}
@keyframes penguinEnter {
  0%   { left: -120px; }
  100% { left: calc(100vw + 120px); }
}

/* LEVEL COMPLETE */
#levelComplete {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(255,255,255,0.75); backdrop-filter: blur(14px); z-index: 1000;
}
#levelComplete h2 { font-size: 50px; color: #ff6b9d; text-shadow: 4px 4px 0 #fff, 6px 6px 0 #ffb3d1; text-align: center; margin-bottom: 14px; animation: bounceIn 0.65s ease; }
.lc-stars { font-size: 46px; margin-bottom: 26px; animation: starSpin 0.85s ease; }
#nextLevelBtn { font-family: inherit; font-size: 27px; padding: 17px 54px; background: linear-gradient(135deg, #ff6b9d, #ff9ecd); color: #fff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(255,107,157,0.5); animation: bounce 0.85s ease infinite alternate; }
#nextLevelBtn:hover { transform: scale(1.08); }

/* WIN SCREEN */
#winScreen {
  position: fixed; inset: 0; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(135deg,rgba(255,209,220,0.9),rgba(200,230,255,0.9));
  backdrop-filter: blur(14px); z-index: 1001;
}
#winScreen .trophy { font-size: 106px; margin-bottom: 14px; animation: starSpin 1s ease; }
#winScreen h1 { font-size: 44px; color: #ff6b9d; text-shadow: 4px 4px 0 #fff; text-align: center; margin-bottom: 12px; animation: bounceIn 0.8s ease; }
#winScreen .finalScore { font-size: 23px; color: #7c5cbf; margin-bottom: 24px; text-align: center; white-space: pre-line; }
#replayBtn { font-family: inherit; font-size: 24px; padding: 15px 46px; background: linear-gradient(135deg,#7bc67e,#a8e6a3); color: #fff; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 6px 20px rgba(123,198,126,0.5); transition: transform 0.2s; }
#replayBtn:hover { transform: scale(1.08); }

/* SHARED ANIMATIONS */
@keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
@keyframes starSpin  { from { transform: scale(0) rotate(-180deg); } to { transform: scale(1) rotate(0); } }
@keyframes bounce    { from { transform: translateY(0); } to { transform: translateY(-8px); } }
@keyframes floatUp   { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-125px) scale(1.55); } }

/* FX */
.feedback-text { position: fixed; font-size: 44px; font-weight: bold; color: #ff6b9d; text-shadow: 3px 3px 0 #fff; pointer-events: none; z-index: 800; animation: floatUp 1.25s ease forwards; }
.confetti-bit  { position: fixed; width: 11px; height: 11px; border-radius: 3px; pointer-events: none; z-index: 700; animation: confettiFall 1.55s ease forwards; }
@keyframes confettiFall { 0% { opacity:1; transform:translate(0,0) rotate(0); } 100% { opacity:0; transform:translate(var(--tx),var(--ty)) rotate(540deg) scale(0.2); } }
.sparkle { position: fixed; font-size: 15px; pointer-events: none; z-index: 600; animation: sparkleFade 0.65s ease forwards; }
@keyframes sparkleFade { 0% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(0.2) translate(var(--sx),var(--sy)); } }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebarLabel">⭐ Stars</div>
  <div id="starList"></div>
  <div id="sidebarMoon">🌝</div>
</div>

<div id="startScreen">
  <svg viewBox="0 0 700 158" width="700" height="158" style="max-width:88vw;margin-bottom:14px">
    <defs><path id="arc" d="M 28,128 Q 350,-22 672,128"/></defs>
    <text font-family="'Chalkboard SE','Comic Sans MS',cursive" font-size="54" font-weight="bold" fill="rgba(255,255,255,0.75)" stroke="rgba(255,255,255,0.55)" stroke-width="9">
      <textPath href="#arc" startOffset="50%" text-anchor="middle">Leyla's Kreativstudio</textPath>
    </text>
    <text font-family="'Chalkboard SE','Comic Sans MS',cursive" font-size="54" font-weight="bold">
      <textPath href="#arc" startOffset="50%" text-anchor="middle">

// ── SIDEBAR ──────────────────────────────────────────────────
function initSidebar(){
  const list=document.getElementById('starList');
  for(let i=0;i<TOTAL;i++){
    const s=document.createElement('div');
    s.className='star-slot'; s.id='star-'+i;
    list.appendChild(s);
  }
}
function lightUpStar(idx){
  const s=document.getElementById('star-'+idx);
  if(!s||s.classList.contains('lit'))return;
  s.classList.add('lit');
  setTimeout(()=>s.classList.add('lit-glow'),750);
  const r=s.getBoundingClientRect();
  spawnConfetti(r.left+r.width/2,r.top+r.height/2,10);
  if(idx===TOTAL-1){
    setTimeout(()=>{
      document.getElementById('sidebarMoon').classList.add('reached');
      for(let i=0;i<6;i++) setTimeout(()=>spawnConfetti(43,window.innerHeight-55,14),i*200);
    },900);
  }
}

// ── AUDIO ────────────────────────────────────────────────────
function initAudio(){
  if(audioStarted)return; audioStarted=true;
  melodySynth=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.05,decay:.2,sustain:.4,release:.8},volume:-18}).toDestination();
  const notes=['C5','E5','G5','E5','C5','D5','E5','D5','C5','G4','A4','B4','C5'];
  melody=new Tone.Sequence((t,n)=>melodySynth.triggerAttackRelease(n,'8n',t),notes,'4n');
  melody.loop=true; Tone.Transport.bpm.value=104; melody.start(0); Tone.Transport.start();
  successSynth=new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sine'},envelope:{attack:.02,decay:.1,sustain:.3,release:.5},volume:-10}).toDestination();
  failSynth=new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.05,decay:.3,sustain:0,release:.3},volume:-12}).toDestination();
}
function playSuccess(){if(muted||!audioStarted)return;successSynth.triggerAttackRelease(['C5','E5','G5'],'8n');setTimeout(()=>successSynth.triggerAttackRelease(['E5','G5','C6'],'4n'),150);}
function playFail(){if(muted||!audioStarted)return;failSynth.triggerAttackRelease('A3','4n');}
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
  if(muted)Tone.Transport.pause();else Tone.Transport.start();
}

function playSkitSound(idx){
  if(muted||!audioStarted)return;
  const patterns=[
    ()=>{const s=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.08,decay:.3,sustain:.2,release:.5},volume:-8}).toDestination();['C3','E3','G3','E3','C3','G3'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'8n'),i*180));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'sawtooth'},envelope:{attack:.01,decay:.1,sustain:0,release:.1},volume:-12}).toDestination();['G5','A5','G5','F5','E5','G5','A5'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'16n'),i*120));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.05,decay:.2,sustain:.4,release:.8},volume:-10}).toDestination();['C4','E4','G4','B4','D5','F5','A5','C6'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'8n'),i*150));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.01,decay:.25,sustain:0,release:.2},volume:-10}).toDestination();['G3','C4','G3','C4','G3','C4'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'16n'),i*200));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.01,decay:.08,sustain:.1,release:.1},volume:-10}).toDestination();['C5','G4','D5','A4','E5','B3','F5'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'32n'),i*140));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.03,decay:.15,sustain:.2,release:.4},volume:-10}).toDestination();['C4','D4','E4','G4','A4','C5','D5','E5'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'8n'),i*130));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.12,decay:.4,sustain:.1,release:.6},volume:-6}).toDestination();[['C2',0],['C2',380],['G2',760],['F2',1140]].forEach(([n,t])=>setTimeout(()=>s.triggerAttackRelease(n,'4n'),t));setTimeout(()=>s.dispose(),3000);},
    ()=>{const s=new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.04,decay:.18,sustain:.3,release:.6},volume:-10}).toDestination();['C4','E4','G4','C5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>s.triggerAttackRelease(n,'8n'),i*160));setTimeout(()=>s.dispose(),3000);},
  ];
  try{patterns[idx%patterns.length]();}catch(e){}
}

// ── GAME START ───────────────────────────────────────────────
function startGame(){initAudio();document.getElementById('startScreen').style.display='none';loadLevel(1);}

function loadLevel(n){
  currentLevel=n;
  memoryFlipped=[]; memoryMatched=new Set(); memoryLocked=false; memoryPairs=0; clickRemaining=0;
  document.getElementById('gameArea').innerHTML='';
  document.getElementById('levelComplete').style.display='none';
  document.getElementById('clickCounter').style.display='none';
  document.getElementById('memoryInfo').style.display='none';
  document.getElementById('levelDisplay').textContent=`Level ${n} / ${TOTAL}`;
  const lv=levels[n-1];
  document.getElementById('taskText').textContent=lv.task;
  document.getElementById('gameTypeBadge').textContent=TYPE_LABELS[lv.type]||'🎮';
  updateScore();
  const areaW=window.innerWidth-86, areaH=window.innerHeight-74;
  const leftW=Math.floor(areaW*.44), rightX=Math.floor(areaW*.52), rightW=areaW-rightX-14;
  if     (lv.type==='color')  buildColorLevel(lv,leftW,rightX,rightW,areaH);
  else if(lv.type==='number') buildNumberLevel(lv,leftW,rightX,rightW,areaH);
  else if(lv.type==='click')  buildClickLevel(lv,areaW,areaH);
  else if(lv.type==='memory') buildMemoryLevel(lv,areaW,areaH);
  else                        buildNormalLevel(lv,leftW,rightX,rightW,areaH);
}

// ── BUILDERS ─────────────────────────────────────────────────
function buildNormalLevel(lv,leftW,rightX,rightW,areaH){
  const area=document.getElementById('gameArea');
  const pos=scatterPos(lv.pairs.length,leftW,areaH);
  lv.pairs.forEach((p,i)=>{
    const d=makeDragEl(p,i);
    d.style.left=pos[i].x+'px'; d.style.top=pos[i].y+'px';
    area.appendChild(d); makeDraggable(d);
    const t=document.createElement('div');
    t.className='drop-target enter'; t.dataset.targetId=p.id;
    t.style.animationDelay=(0.18+i*0.08)+'s';
    if(p.targetScale&&p.targetScale!==1)t.style.fontSize=(86*p.targetScale)+'px';
    t.textContent=p.target||'';
    const g=gridPos(i,lv.pairs.length,rightX,rightW,areaH);
    t.style.left=g.x+'px'; t.style.top=g.y+'px';
    area.appendChild(t);
  });
}

function buildColorLevel(lv,leftW,rightX,rightW,areaH){
  const area=document.getElementById('gameArea');
  const pos=scatterPos(lv.pairs.length,leftW,areaH);
  lv.pairs.forEach((p,i)=>{
    const d=makeDragEl(p,i);
    d.style.left=pos[i].x+'px'; d.style.top=pos[i].y+'px';
    area.appendChild(d); makeDraggable(d);
    const t=document.createElement('div');
    t.className='color-target drop-target enter'; t.dataset.targetId=p.id;
    t.style.animationDelay=(0.18+i*0.08)+'s';
    t.style.background=hexRgba(p.color,.2); t.style.borderColor=p.color;
    t.style.boxShadow=`0 0 18px ${hexRgba(p.color,.25)}`; t.textContent=p.label;
    const g=gridPos(i,lv.pairs.length,rightX,rightW,areaH);
    t.style.left=g.x+'px'; t.style.top=g.y+'px';
    area.appendChild(t);
  });
}

function buildNumberLevel(lv,leftW,rightX,rightW,areaH){
  const area=document.getElementById('gameArea');
  const pos=scatterPos(lv.pairs.length,leftW,areaH);
  lv.pairs.forEach((p,i)=>{
    const d=makeDragEl(p,i);
    const len=[...p.drag].filter(c=>c.codePointAt(0)>127).length||p.drag.length;
    d.style.fontSize=len>=5?'26px':len>=4?'32px':len>=3?'42px':len>=2?'52px':'78px';
    d.style.width='152px';
    d.style.left=pos[i].x+'px'; d.style.top=pos[i].y+'px';
    area.appendChild(d); makeDraggable(d);
    const t=document.createElement('div');
    t.className='number-target drop-target enter'; t.dataset.targetId=p.id;
    t.style.animationDelay=(0.18+i*0.08)+'s'; t.textContent=p.label;
    const g=gridPos(i,lv.pairs.length,rightX,rightW,areaH);
    t.style.left=g.x+'px'; t.style.top=g.y+'px';
    area.appendChild(t);
  });
}

function buildClickLevel(lv,areaW,areaH){
  const area=document.getElementById('gameArea');
  const all=[...lv.correct.map(e=>({emoji:e,correct:true})),...lv.distractors.map(e=>({emoji:e,correct:false}))];
  shuffle(all);
  const pos=scatterPos(all.length,areaW-30,areaH);
  clickRemaining=lv.correct.length;
  updateClickCounter();
  document.getElementById('clickCounter').style.display='block';
  all.forEach((item,i)=>{
    const el=document.createElement('div');
    el.className='click-item enter'; el.textContent=item.emoji;
    el.dataset.correct=item.correct;
    el.style.animationDelay=(i*0.06)+'s';
    el.style.left=pos[i].x+'px'; el.style.top=pos[i].y+'px';
    el.addEventListener('click',()=>onClickItem(el));
    el.addEventListener('touchend',e=>{e.preventDefault();onClickItem(el);});
    area.appendChild(el);
  });
}

function buildMemoryLevel(lv,areaW,areaH){
  const area=document.getElementById('gameArea');
  memoryPairs=lv.pairs.length;
  const cards=[...lv.pairs,...lv.pairs];
  shuffle(cards);
  const count=cards.length;
  const cols=count<=8?4:count<=10?5:4;
  const rows=Math.ceil(count/cols);
  const cardSize=Math.min(90,Math.floor(Math.min((areaW*.82)/cols,(areaH*.82)/rows)-12));
  const gap=10;
  const gridW=cols*cardSize+(cols-1)*gap;
  const gridH=rows*cardSize+(rows-1)*gap;
  const startX=(areaW-gridW)/2, startY=(areaH-gridH)/2;
  document.getElementById('memoryInfo').style.display='block';
  updateMemoryInfo();
  cards.forEach((emoji,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const el=document.createElement('div');
    el.className='memory-card face-down';
    el.dataset.emoji=emoji; el.dataset.cardIdx=i;
    el.textContent='❓';
    el.style.left=(startX+col*(cardSize+gap))+'px';
    el.style.top=(startY+row*(cardSize+gap))+'px';
    el.style.width=cardSize+'px'; el.style.height=cardSize+'px';
    el.style.fontSize=Math.floor(cardSize*.55)+'px';
    el.style.animationDelay=(i*.04)+'s';
    el.addEventListener('click',()=>onMemoryClick(el));
    el.addEventListener('touchend',e=>{e.preventDefault();onMemoryClick(el);});
    area.appendChild(el);
  });
}

function makeDragEl(p,i){
  const d=document.createElement('div');
  d.className='drag-obj enter'; d.dataset.id=p.id; d.textContent=p.drag;
  d.style.animationDelay=(i*0.08)+'s';
  if(p.dragScale&&p.dragScale!==1)d.style.fontSize=(86*p.dragScale)+'px';
  return d;
}

// ── POSITIONING ──────────────────────────────────────────────
function scatterPos(count,maxX,areaH){
  const margin=Math.max(88,128-count*5);
  const mxX=Math.max(20,maxX-116), mxY=Math.max(20,areaH-116);
  const out=[]; let t=0;
  while(out.length<count&&t<4000){t++;
    const x=ri(14,mxX),y=ri(14,mxY);
    if(!out.some(p=>Math.abs(p.x-x)<margin&&Math.abs(p.y-y)<margin))out.push({x,y});
  }
  return out;
}
function gridPos(i,total,startX,width,areaH){
  const cols=total===6?3:total<=3?1:2;
  const rows=Math.ceil(total/cols);
  const col=i%cols,row=Math.floor(i/cols);
  const cw=width/cols,ch=areaH/rows;
  return{x:startX+col*cw+cw/2-63,y:row*ch+ch/2-63};
}
function ri(a,b){return Math.floor(Math.random()*(b-a))+a;}
function hexRgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── DRAG & DROP ──────────────────────────────────────────────
function makeDraggable(el){
  let sx,sy,ox,oy,dragging=false,sparkT=null;
  el.addEventListener('mousedown',down);
  el.addEventListener('touchstart',down,{passive:false});
  function down(e){
    e.preventDefault();dragging=true;el.classList.add('dragging');
    const pt=e.touches?e.touches[0]:e;
    sx=pt.clientX;sy=pt.clientY;ox=parseInt(el.style.left)||0;oy=parseInt(el.style.top)||0;
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
    document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
    sparkT=setInterval(()=>spawnSparkle(el),90);
  }
  function move(e){
    if(!dragging)return;e.preventDefault();
    const pt=e.touches?e.touches[0]:e;
    el.style.left=(ox+pt.clientX-sx)+'px';el.style.top=(oy+pt.clientY-sy)+'px';
    document.querySelectorAll('.drop-target').forEach(t=>t.classList.remove('hovered'));
    const h=hoveredTarget(el);if(h)h.classList.add('hovered');
  }
  function up(){
    if(!dragging)return;dragging=false;el.classList.remove('dragging');
    clearInterval(sparkT);
    document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
    document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);
    document.querySelectorAll('.drop-target').forEach(t=>t.classList.remove('hovered'));
    const t=hoveredTarget(el);
    if(t&&t.dataset.targetId===el.dataset.id&&!t.classList.contains('matched'))correctDrop(el,t);
    else wrongDrop(el,ox,oy);
  }
}
function hoveredTarget(el){
  const d=el.getBoundingClientRect();
  for(const t of document.querySelectorAll('.drop-target')){
    if(t.classList.contains('matched'))continue;
    const r=t.getBoundingClientRect();
    if(d.left<r.right&&d.right>r.left&&d.top<r.bottom&&d.bottom>r.top)return t;
  }
  return null;
}

// ── CLICK GAME ───────────────────────────────────────────────
function onClickItem(el){
  if(el.classList.contains('hit-correct'))return;
  const r=el.getBoundingClientRect();
  if(el.dataset.correct==='true'){
    score++;updateScore();playSuccess();
    spawnConfetti(r.left+r.width/2,r.top+r.height/2,14);
    spawnFeedback(r.left+r.width/2,r.top,['TREFFER! 🎯','SUPER! ⭐','TOLL! 🌟','JA! 🥳','PRIMA! 💖'][ri(0,5)]);
    el.classList.add('hit-correct');
    clickRemaining--;updateClickCounter();
    setTimeout(()=>{el.style.display='none';if(clickRemaining<=0)setTimeout(triggerLevelComplete,400);},450);
  }else{
    playFail();
    el.classList.remove('hit-wrong');void el.offsetWidth;el.classList.add('hit-wrong');
    setTimeout(()=>el.classList.remove('hit-wrong'),500);
    spawnFeedback(r.left+r.width/2,r.top,['Ups! 😬','Nicht das! 🙈','Fast! 😄'][ri(0,3)]);
  }
}
function updateClickCounter(){
  const el=document.getElementById('clickCounter');
  if(clickRemaining>0){el.textContent=`Noch ${clickRemaining} zu finden! 👆`;el.style.display='block';}
  else el.style.display='none';
}

// ── MEMORY GAME ──────────────────────────────────────────────
function onMemoryClick(el){
  if(memoryLocked)return;
  if(!el.classList.contains('face-down'))return;
  const idx=parseInt(el.dataset.cardIdx);
  if(memoryMatched.has(idx)||memoryFlipped.includes(idx))return;
  el.classList.remove('face-down');el.classList.add('face-up','flip-reveal');
  el.textContent=el.dataset.emoji;
  memoryFlipped.push(idx);
  if(memoryFlipped.length===2){
    memoryLocked=true;
    const allCards=document.querySelectorAll('.memory-card');
    const [i1,i2]=memoryFlipped;
    const el1=allCards[i1],el2=allCards[i2];
    if(el1.dataset.emoji===el2.dataset.emoji){
      score++;updateScore();playSuccess();
      setTimeout(()=>{
        el1.classList.add('matched-card');el2.classList.add('matched-card');
        memoryMatched.add(i1);memoryMatched.add(i2);
        const r=el1.getBoundingClientRect();
        spawnConfetti(r.left+r.width/2,r.top+r.height/2,16);
        spawnFeedback(r.left+r.width/2,r.top,['PAAR! 🎯','SUPER! ⭐','TOLL! 🌟'][ri(0,3)]);
        memoryFlipped=[];memoryLocked=false;updateMemoryInfo();
        if(memoryMatched.size/2>=memoryPairs)setTimeout(triggerLevelComplete,500);
      },300);
    }else{
      playFail();
      setTimeout(()=>{
        [el1,el2].forEach(c=>{
          c.classList.add('flip-back');
          setTimeout(()=>{c.classList.remove('face-up','flip-reveal','flip-back');c.classList.add('face-down');c.textContent='❓';},350);
        });
        memoryFlipped=[];memoryLocked=false;
      },900);
    }
  }
}
function updateMemoryInfo(){
  document.getElementById('memoryInfo').textContent=`🃏 ${memoryMatched.size/2} / ${memoryPairs} Paare gefunden`;
}

// ── DROP HANDLERS ────────────────────────────────────────────
function correctDrop(dragEl,targetEl){
  score++;updateScore();playSuccess();
  const r=targetEl.getBoundingClientRect();
  spawnConfetti(r.left+r.width/2,r.top+r.height/2);
  spawnFeedback(r.left+r.width/2,r.top,['JUHU! 🎉','SUPER! ⭐','TOLL! 🌟','YEAH! 🥳','PRIMA! 💖','BRAVO! 👏','WOW! ✨'][ri(0,7)]);
  dragEl.classList.add('matched');targetEl.classList.add('matched');targetEl.classList.remove('hovered');
  setTimeout(()=>{if(document.querySelectorAll('.drag-obj:not(.matched)').length===0)triggerLevelComplete();},650);
}
function wrongDrop(el,ox,oy){
  playFail();
  el.style.transition='left .48s ease,top .48s ease';
  el.style.left=ox+'px';el.style.top=oy+'px';
  setTimeout(()=>{el.style.transition='';},550);
}

}

function showSkit(idx){
  const skit=SKITS[idx];
  document.getElementById('skitContent').innerHTML=skit.build();
  document.getElementById('skitOverlay').style.display='flex';
  playSkitSound(idx);
  for(let i=0;i<4;i++) setTimeout(()=>spawnConfetti(ri(120,window.innerWidth-120),ri(80,window.innerHeight-220),18),i*350);
  skitTimer=setTimeout(skipSkit,skit.dur||3500);
}
function skipSkit(){
  clearTimeout(skitTimer);
  document.getElementById('skitOverlay').style.display='none';
  showLevelComplete();
}
function showLevelComplete(){
  const isLast=currentLevel===TOTAL;
  document.getElementById('levelCompleteText').textContent=isLast?'ALLE 30 LEVEL GESCHAFFT! 🎊':`Level ${currentLevel} geschafft! 🎉`;
  document.getElementById('lcStars').textContent=isLast?'🌟🌟🌟🌟🌟':'⭐⭐⭐';
  document.getElementById('nextLevelBtn').textContent=isLast?'Zum Finale! 🏆':'Nächstes Level →';
  document.getElementById('levelComplete').style.display='flex';
  spawnConfetti(window.innerWidth/2,window.innerHeight/2,42);
}
function nextLevel(){if(currentLevel>=TOTAL)showWin();else loadLevel(currentLevel+1);}
function showWin(){
  document.getElementById('levelComplete').style.display='none';
  document.getElementById('winScreen').style.display='flex';
  document.getElementById('finalScore').textContent=`Alle ${TOTAL} Level bestanden!\nDu hast ${score} Punkte gesammelt!\n${'⭐'.repeat(Math.min(score,20))}`;
  for(let i=0;i<12;i++) setTimeout(()=>spawnConfetti(ri(80,window.innerWidth-80),ri(60,window.innerHeight-80),22),i*200);
}
function replay(){
  score=0;updateScore();
  document.getElementById('winScreen').style.display='none';
  document.querySelectorAll('.star-slot').forEach(s=>s.classList.remove('lit','lit-glow'));
  document.getElementById('sidebarMoon').classList.remove('reached');
  loadLevel(1);
}
function updateScore(){document.getElementById('scoreDisplay').textContent=`⭐ ${score}`;}

// ── VISUAL FX ────────────────────────────────────────────────
const confColors=['#ff6b9d','#ffd700','#7bc67e','#64b5f6','#ff8a65','#ba68c8','#4dd0e1','#fff176','#ffb3d1'];
function spawnConfetti(cx,cy,n=22){
  for(let i=0;i<n;i++){
    const b=document.createElement('div');b.className='confetti-bit';
    b.style.left=cx+'px';b.style.top=cy+'px';
    b.style.background=confColors[ri(0,confColors.length)];
    const a=Math.random()*Math.PI*2,d=65+Math.random()*155;
    b.style.setProperty('--tx',(Math.cos(a)*d)+'px');b.style.setProperty('--ty',(Math.sin(a)*d-72)+'px');
    b.style.animationDelay=(Math.random()*.18)+'s';b.style.borderRadius=Math.random()>.5?'50%':'3px';
    document.body.appendChild(b);setTimeout(()=>b.remove(),2100);
  }
}
function spawnFeedback(cx,cy,txt){
  const el=document.createElement('div');el.className='feedback-text';el.textContent=txt;
  el.style.left=Math.max(100,cx-80)+'px';el.style.top=(cy-18)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1350);
}
function spawnSparkle(el){
  const r=el.getBoundingClientRect();
  const sp=document.createElement('div');sp.className='sparkle';
  sp.textContent=['✨','⭐','💫','🌟','🔆'][ri(0,5)];
  sp.style.left=(r.left+ri(0,r.width))+'px';sp.style.top=(r.top+ri(0,r.height))+'px';
  sp.style.setProperty('--sx',ri(-22,22)+'px');sp.style.setProperty('--sy',ri(-32,8)+'px');
  document.body.appendChild(sp);setTimeout(()=>sp.remove(),700);
}
